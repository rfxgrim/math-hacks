<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Proxy Launcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root {
  --bg:#0b0b0f;
  --card:#14141a;
  --card-hover:#1e1e26;
  --text:#ffffff;
  --muted:#9aa0a6;
  --particle:rgba(255,255,255,.12);
  --glass:rgba(20,20,26,.75);
  --blur:blur(14px);
  --accent:#3b82f6;
}

* { box-sizing:border-box; font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; }

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:hidden;
}

/* FLOATING HOTBAR */
.hotbar {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--glass);
  backdrop-filter:var(--blur);
  border-radius:999px;
  padding:6px;
  display:flex;
  gap:6px;
  z-index:3;
  animation:floatIn .8s ease forwards;
}

@keyframes floatIn {
  from { opacity:0; transform:translate(-50%,-20px); }
  to { opacity:1; transform:translate(-50%,0); }
}

.hotbar button {
  position:relative;
  border:none;
  background:none;
  color:var(--muted);
  padding:10px 18px;
  border-radius:999px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:color .2s ease;
}

.hotbar button:hover {
  color:var(--text);
}

.hotbar button.active {
  color:var(--text);
}

.indicator {
  position:absolute;
  bottom:6px;
  height:3px;
  background:var(--accent);
  border-radius:999px;
  transition:all .35s cubic-bezier(.4,0,.2,1);
}

/* PARTICLES */
.particles {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.particle {
  position:absolute;
  bottom:-20px;
  border-radius:50%;
  background:var(--particle);
  animation:rise linear infinite;
}

@keyframes rise {
  from { transform:translateY(0); opacity:0; }
  10% { opacity:1; }
  to { transform:translateY(-120vh); opacity:0; }
}

/* CONTENT */
.container {
  position:relative;
  z-index:1;
  max-width:420px;
  margin:140px auto 0;
  padding:24px;
  text-align:center;
}

.section {
  display:none;
  animation:fadeSlide .4s ease forwards;
}

.section.active { display:block; }

@keyframes fadeSlide {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

h1 { margin:0 0 8px; font-size:22px; }
.bio { color:var(--muted); font-size:14px; margin-bottom:24px; }

input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  background:var(--card);
  color:var(--text);
  margin-bottom:12px;
}

.action {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:var(--text);
  font-weight:600;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}

.action:hover {
  background:var(--card-hover);
  transform:translateY(-1px);
}
</style>
</head>

<body>

<!-- FLOATING HOTBAR -->
<div class="hotbar" id="hotbar">
  <button class="active" onclick="switchTab('proxy',this)">Proxy</button>
  <button onclick="switchTab('games',this)">Games</button>
  <button onclick="switchTab('apps',this)">Apps</button>
  <button onclick="switchTab('settings',this)">Settings</button>
  <div class="indicator" id="indicator"></div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- CONTENT -->
<div class="container">

  <div id="proxy" class="section active">
    <h1>Proxy</h1>
    <div class="bio">Enter a URL to open through your proxy</div>
    <input id="urlInput" placeholder="https://example.com">
    <button class="action" onclick="openProxy()">Open</button>
  </div>

  <div id="games" class="section">
    <h1>Games</h1>
    <div class="bio">Quick game launch</div>
    <button class="action">Game 1</button>
    <button class="action">Game 2</button>
  </div>

  <div id="apps" class="section">
    <h1>Apps</h1>
    <div class="bio">App shortcuts</div>
    <button class="action">YouTube</button>
    <button class="action">Discord</button>
    <button class="action">Reddit</button>
  </div>

  <div id="settings" class="section">
    <h1>Settings</h1>
    <div class="bio">Preferences</div>
    <button class="action">Theme</button>
    <button class="action">Clear Data</button>
  </div>

</div>

<script>
/* TAB SWITCHING + INDICATOR */
const indicator = document.getElementById("indicator");
const hotbar = document.getElementById("hotbar");

function updateIndicator(btn) {
  const r = btn.getBoundingClientRect();
  const p = hotbar.getBoundingClientRect();
  indicator.style.left = (r.left - p.left) + "px";
  indicator.style.width = r.width + "px";
}

window.onload = () => updateIndicator(document.querySelector(".hotbar .active"));

function switchTab(id, btn) {
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".hotbar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  updateIndicator(btn);
}

/* PROXY */
function openProxy() {
  const input = document.getElementById("urlInput").value.trim();
  if (!input) return;
  const proxyBase = "https://YOUR-PROXY-DOMAIN/service/";
  const target = input.startsWith("http") ? input : "https://" + input;
  window.open(proxyBase + encodeURIComponent(target), "_blank");
}

/* PARTICLES */
const pc = document.getElementById("particles");
for (let i=0;i<50;i++){
  const p=document.createElement("div");
  p.className="particle";
  const s=3+Math.random()*6;
  p.style.width=p.style.height=s+"px";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=12+Math.random()*20+"s";
  p.style.animationDelay=Math.random()*20+"s";
  pc.appendChild(p);
}
</script>

</body>
</html>
