<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOTBAR -->
<div class="hotbar" id="hotbar">
  <button class="active" onclick="switchTab('proxy',this)">Proxy</button>
  <button onclick="switchTab('games',this)">Games</button>
  <button onclick="switchTab('apps',this)">Apps</button>
  <button onclick="switchTab('settings',this)">Settings</button>
  <div class="indicator" id="indicator"></div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- CONTENT -->
<div class="container">

  <div id="proxy" class="section active animate">
    <h1>Proxy</h1>
    <div class="bio">Enter a URL to open through your proxy</div>

    <div class="input-wrapper">
      <input id="urlInput" placeholder="https://example.com">
    </div>

    <button class="action" onclick="openProxy()">Open</button>
  </div>

  <div id="games" class="section">
    <h1>Games</h1>
    <div class="bio">Quick game launch</div>
    <button class="action">Game 1</button>
    <button class="action">Game 2</button>
  </div>

  <div id="apps" class="section">
    <h1>Apps</h1>
    <div class="bio">App shortcuts</div>
    <button class="action">YouTube</button>
    <button class="action">Discord</button>
    <button class="action">Reddit</button>
  </div>

  <div id="settings" class="section">
    <h1>Settings</h1>
    <div class="bio">Preferences</div>
    <button class="action">Theme</button>
    <button class="action">Clear Data</button>
  </div>

</div>

<script>
/* HOTBAR INDICATOR */
const indicator = document.getElementById("indicator");
const hotbar = document.getElementById("hotbar");

function updateIndicator(btn) {
  const r = btn.getBoundingClientRect();
  const p = hotbar.getBoundingClientRect();
  indicator.style.left = (r.left - p.left) + "px";
  indicator.style.width = r.width + "px";
}

window.onload = () => updateIndicator(document.querySelector(".hotbar .active"));

function switchTab(id, btn) {
  document.querySelectorAll(".section").forEach(s => {
    s.classList.remove("active","animate");
  });

  const target = document.getElementById(id);
  target.classList.add("active");
  requestAnimationFrame(() => target.classList.add("animate"));

  document.querySelectorAll(".hotbar button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  updateIndicator(btn);
}

/* PROXY */
function openProxy() {
  const input = document.getElementById("urlInput").value.trim();
  if (!input) return;
  const proxyBase = "https://YOUR-PROXY-DOMAIN/service/";
  const target = input.startsWith("http") ? input : "https://" + input;
  window.open(proxyBase + encodeURIComponent(target), "_blank");
}

/* PARTICLES */
const pc = document.getElementById("particles");
for (let i = 0; i < 50; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  const s = 3 + Math.random() * 6;
  p.style.width = p.style.height = s + "px";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = 12 + Math.random() * 20 + "s";
  p.style.animationDelay = Math.random() * 20 + "s";
  pc.appendChild(p);
}
</script>

</body>
</html>
