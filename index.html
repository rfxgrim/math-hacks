<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Classroom</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- HOTBAR -->
<div class="hotbar" id="hotbar">
  <button class="active" onclick="switchTab('proxy',this)">Home</button>
  <button onclick="switchTab('games',this)">Games</button>
  <button onclick="switchTab('apps',this)">Applications</button>
  <button onclick="switchTab('settings',this)">Configurations</button>
  <div class="indicator" id="indicator"></div>
</div>
<!-- PARTICLES -->
<div class="particles" id="particles"></div>
<!-- CONTENT -->
<div class="container">
  <div id="proxy" class="section active animate">
    <h1>Proxy</h1>
    <div class="bio">search freely through the web</div>
    <div class="input-wrapper" id="inputWrapper">
      <canvas class="spin-canvas" id="spinCanvas"></canvas>
      <input id="urlInput" placeholder="https://example.com">
    </div>
    <button class="action" onclick="openProxy()">Open</button>
  </div>
  <div id="games" class="section">
    <h1>Games</h1>
    <div class="bio">Will be added soon</div>
  </div>
  <div id="apps" class="section">
    <h1>Apps</h1>
    <div class="bio">Will be added soon</div>
  </div>
  <div id="settings" class="section">
    <h1>Settings</h1>
    <div class="bio">Preferences</div>
    <button class="action">Theme</button>
    <button class="action">Clear Data</button>
  </div>
</div>

<script src="/baremux/index.js"></script>
<script src="/scram/scramjet.all.js"></script>
<script>
let scramjet = null;

async function initScramjet() {
  const regs = await navigator.serviceWorker.getRegistrations();
  await Promise.all(regs.map(reg => reg.unregister()));

  const { ScramjetController } = $scramjetLoadController();
  scramjet = new ScramjetController({
    files: {
      wasm: "/scram/scramjet.wasm.wasm",
      all: "/scram/scramjet.all.js",
      sync: "/scram/scramjet.sync.js",
    },
  });
  await scramjet.init("/sw.js");
  const reg = await navigator.serviceWorker.register("/sw.js", { scope: "/" });

  await new Promise(resolve => {
    if (reg.active) return resolve();
    const sw = reg.installing || reg.waiting;
    sw.addEventListener("statechange", e => {
      if (e.target.state === "activated") resolve();
    });
  });

  const conn = new BareMux.BareMuxConnection("/baremux/worker.js");
  await conn.setTransport("/epoxy/index
